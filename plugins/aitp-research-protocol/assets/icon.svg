  <path d="M255 89V423" stroke="#EAF6FF" stroke-width="6" stroke-linecap="round" opacity="0.17"/>
  <path d="M89 256H423" stroke="#EAF6FF" stroke-width="6" stroke-linecap="round" opacity="0.13"/>
  <path d="M177 358L246 158C249 149 263 149 266 158L335 358H291L279 321H233L221 358H177ZM243 285H269L256 240L243 285Z" fill="url(#mark)"/>
