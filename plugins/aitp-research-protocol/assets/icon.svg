<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">AITP Research Protocol icon</title>
  <desc id="desc">A dark square icon with a bright theoretical physics orbit, evidence nodes, and an A monogram.</desc>
  <defs>
    <linearGradient id="bg" x1="64" y1="42" x2="448" y2="470" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#12213D"/>
      <stop offset="0.52" stop-color="#101820"/>
      <stop offset="1" stop-color="#0B3138"/>
    </linearGradient>
    <linearGradient id="orbit" x1="84" y1="110" x2="428" y2="402" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#7DD3FC"/>
      <stop offset="0.46" stop-color="#2F80ED"/>
      <stop offset="1" stop-color="#12D7D7"/>
    </linearGradient>
    <linearGradient id="mark" x1="174" y1="152" x2="340" y2="358" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F8FBFF"/>
      <stop offset="1" stop-color="#C7E6FF"/>
    </linearGradient>
    <filter id="softShadow" x="-25%" y="-25%" width="150%" height="150%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#020617" flood-opacity="0.36"/>
    </filter>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.07 0 0 0 0 0.84 0 0 0 0 0.84 0 0 0 0.58 0"/>
      <feBlend in2="SourceGraphic" mode="screen"/>
    </filter>
  </defs>
  <rect x="32" y="32" width="448" height="448" rx="96" fill="url(#bg)" filter="url(#softShadow)"/>
