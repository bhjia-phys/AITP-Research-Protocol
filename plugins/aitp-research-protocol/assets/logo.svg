<svg width="1200" height="520" viewBox="0 0 1200 520" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">AITP Research Protocol logo</title>
  <desc id="desc">Logo for the AITP Research Protocol Codex plugin with orbiting evidence nodes and wordmark.</desc>
  <defs>
    <linearGradient id="panel" x1="66" y1="43" x2="1124" y2="477" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#12213D"/>
      <stop offset="0.55" stop-color="#101820"/>
      <stop offset="1" stop-color="#0B3138"/>
    </linearGradient>
    <linearGradient id="orbit" x1="102" y1="120" x2="418" y2="402" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#7DD3FC"/>
      <stop offset="0.48" stop-color="#2F80ED"/>
      <stop offset="1" stop-color="#12D7D7"/>
    </linearGradient>
    <linearGradient id="mark" x1="190" y1="150" x2="340" y2="356" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F8FBFF"/>
      <stop offset="1" stop-color="#C7E6FF"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-25%" width="120%" height="150%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#020617" flood-opacity="0.34"/>
    </filter>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.07 0 0 0 0 0.84 0 0 0 0 0.84 0 0 0 0.5 0"/>
      <feBlend in2="SourceGraphic" mode="screen"/>
    </filter>
  </defs>
  <rect x="48" y="48" width="1104" height="424" rx="76" fill="url(#panel)" filter="url(#shadow)"/>
  <g transform="translate(36 0)">
    <path d="M112 346C147 391 225 386 287 335C350 283 375 206 340 161C305 116 227 121 165 173C102 225 77 301 112 346Z" stroke="#6EE7F9" stroke-width="9" stroke-linecap="round" opacity="0.32"/>
    <path d="M106 185C139 138 216 137 285 180C354 224 388 297 355 344C322 391 245 392 176 349C107 305 73 232 106 185Z" stroke="url(#orbit)" stroke-width="11" stroke-linecap="round" filter="url(#glow)"/>
    <path d="M260 92V417" stroke="#EAF6FF" stroke-width="5" stroke-linecap="round" opacity="0.16"/>
    <path d="M100 256H420" stroke="#EAF6FF" stroke-width="5" stroke-linecap="round" opacity="0.12"/>
    <path d="M184 356L250 160C253 151 266 151 269 160L335 356H293L282 320H237L226 356H184ZM247 284H272L260 241L247 284Z" fill="url(#mark)"/>
    <path d="M215 370H304" stroke="#12D7D7" stroke-width="10" stroke-linecap="round"/>
    <circle cx="133" cy="197" r="21" fill="#F6C14A"/>
    <circle cx="133" cy="197" r="8" fill="#FFF7D6"/>
    <circle cx="368" cy="328" r="17" fill="#12D7D7"/>
    <circle cx="368" cy="328" r="7" fill="#E6FFFF"/>
    <circle cx="328" cy="142" r="12" fill="#7DD3FC"/>
    <circle cx="328" cy="142" r="5" fill="#F8FBFF"/>
  </g>
  <g fill="#F8FBFF">
    <text x="500" y="228" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="92" font-weight="760">AITP</text>
    <text x="500" y="306" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="45" font-weight="650">Research Protocol</text>
  </g>
  <text x="502" y="363" fill="#B9D7EA" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="25" font-weight="500">typed physics memory | evidence gates | Codex MCP</text>
  <path d="M500 392H882" stroke="#12D7D7" stroke-width="4" stroke-linecap="round" opacity="0.64"/>
  <circle cx="908" cy="392" r="7" fill="#F6C14A"/>
</svg>
