<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">AITP AI Mark</title>
  <desc id="desc">A dark rounded-square AITP logo featuring a luminous AI monogram inside a protocol field with orbital layer nodes.</desc>
  <defs>
    <linearGradient id="bg" x1="30" y1="18" x2="474" y2="492" gradientUnits="userSpaceOnUse">
      <stop stop-color="#071723"/>
      <stop offset="0.55" stop-color="#0A1E31"/>
      <stop offset="1" stop-color="#040B13"/>
    </linearGradient>
    <radialGradient id="portal" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(256 254) rotate(90) scale(172)">
      <stop stop-color="#123B57"/>
      <stop offset="0.6" stop-color="#0C2338"/>
      <stop offset="1" stop-color="#07111D"/>
    </radialGradient>
    <radialGradient id="coreGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(250 246) rotate(90) scale(96)">
      <stop stop-color="#6AF8F0" stop-opacity="0.34"/>
      <stop offset="1" stop-color="#6AF8F0" stop-opacity="0"/>
