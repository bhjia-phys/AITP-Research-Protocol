    <path d="M206 266H250" stroke="#A8FFF8" stroke-opacity="0.5" stroke-width="14" stroke-linecap="round"/>
    <rect x="286" y="170" width="38" height="176" rx="19" fill="#8BF7EE" fill-opacity="0.42"/>
