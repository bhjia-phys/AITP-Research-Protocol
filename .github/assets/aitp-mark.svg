      <stop offset="1" stop-color="#A98BFF"/>
    </linearGradient>
    <linearGradient id="glyphStroke" x1="180" y1="162" x2="330" y2="338" gradientUnits="userSpaceOnUse">
      <stop stop-color="#EFFFFF"/>
      <stop offset="0.38" stop-color="#87FFF2"/>
      <stop offset="1" stop-color="#76A8FF"/>
    </linearGradient>
    <linearGradient id="glyphFill" x1="306" y1="166" x2="306" y2="348" gradientUnits="userSpaceOnUse">
